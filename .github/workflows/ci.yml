name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    name: test (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Unit tests (engine + build)
        run: npm test
      - name: Build payload
        run: npm run build
      - name: Verify committed dist/ is up to date
        run: |
          if ! git diff --exit-code -- dist/; then
            echo "::error::dist/ is stale. Run 'npm run build' and commit the result."
            exit 1
          fi
